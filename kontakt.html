<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panonika Tuzla</title>
    <link rel="stylesheet" href="tptpstil.css">
</head>
<body>

    <main class="container">
        <form id="contactForm" novalidate>
            <h2>KONTAKTIRAJTE NAS</h2>

            <section class="input-group">
                <input type="text" id="name" placeholder="Ime">
                <span class="error-msg"></span>
            </section>

            <section class="input-group">
                <input type="text" id="surname" placeholder="Prezime">
                <span class="error-msg"></span>
            </section>

            <section class="input-group">
                <select id="subject">
                    <option value="">Izaberite opciju</option>                
                    <option value="General">Generalni upit</option>           
                    <option value="Support">Tehnička podrška</option>         
                    <option value="Feedback">Povratne informacije</option>    
                </select>
                <span class="error-msg"></span>
            </section>

            <section class="input-group">
                <input type="text" id="phone" placeholder="Broj telefona">
                <span class="error-msg"></span>
            </section>

            <section class="input-group">
                <input type="email" id="email" placeholder="Email">
                <span class="error-msg"></span>
            </section>

            <section class="input-group">
                <textarea id="message" placeholder="Poruka" rows="4"></textarea>
                <span class="error-msg"></span>
            </section>

            <button type="submit" id="submitBtn">PODNESI</button>
            <button type="button" id="resetBtn">RESET</button>
        </form>

        <section id="successMessage" class="hidden"></section>
    </main>

    <script src="tptpskripte.js"></script>

</body>
</html>
